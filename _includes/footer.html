<footer class="colophon">
  <div class="colophon__rule"></div>
  <div class="colophon__grid">
    <div class="colophon__col">
      <div class="colophon__label">Colophon</div>
      <p>
        Set in <span class="italic">Instrument Serif</span> &amp; JetBrains Mono.
        Built with Jekyll. Published on GitHub Pages.
      </p>
    </div>
    <div class="colophon__col">
      <div class="colophon__label">Author</div>
      <p>
        <a href="https://github.com/{{ site.author.github }}">{{ site.author.name }}</a>
      </p>
    </div>
    <div class="colophon__col">
      <div class="colophon__label">Elsewhere</div>
      <p>
        <a href="{{ '/feed.xml' | relative_url }}">Atom feed</a><br>
        <a href="https://github.com/{{ site.author.github }}/blogs">Source</a>
      </p>
    </div>
    <div class="colophon__col colophon__col--right">
      <div class="colophon__label">MMXXVI</div>
      <p class="colophon__mark">№{% if page.issue %} {{ page.issue | prepend: '000' | slice: -3, 3 }}{% else %} —{% endif %}</p>
    </div>
  </div>
</footer>

<script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
